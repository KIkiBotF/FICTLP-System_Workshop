<html lang="en">

  <meta charset="UTF-8" />

  <link rel="stylesheet" href="ChapterStudent.css" />
</head>
<body>

  <aside class="sidebar">
    <a class="nav-item nav-back" href="CoursePageStudent.html">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </a>
    <a class="nav-item" href="logout.html">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Log out</span>
    </a>
    <a class="nav-item active" href="dashboard.html">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-item" href="performance.html">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><polyline points="6 12 10 8 14 11 18 7"/></svg>
      <span>Performance</span>
    </a>
    <a class="nav-item" href="subjects.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Subject</span>

    <a class="nav-item" href="achievements.html">

      <span>Achievement</span>
    </a>
  </aside>

  <main class="main">

    <div class="chapter-header">
      <h1 id="chapterTitleDisplay">Loading Chapter...</h1>
    </div>

    <div class="content-grid">

      <div class="section-col">
        <div class="section-label">Slide</div>
        <div class="media-card" onclick="openSlide()" style="cursor: pointer;">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
      </div>

      <div class="section-col video-col">
        <div class="section-label">Video</div>
        <div class="media-card" onclick="openVideo(1)" style="cursor: pointer;">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="5" width="15" height="14" rx="2"/>
            <polygon points="22 7 17 12 22 17 22 7"/>
          </svg>
        </div>
        <div class="media-card" onclick="openVideo(2)" style="cursor: pointer;">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="5" width="15" height="14" rx="2"/>
            <polygon points="22 7 17 12 22 17 22 7"/>
          </svg>
        </div>
      </div>

      <div class="section-col quiz-col">
        <div class="section-label">Quiz</div>
        <div class="quiz-box">
          <div class="quiz-questions">10 QUESTIONS</div>
          <button class="btn-quiz" onclick="startQuiz()">Start Quiz</button>
        </div>
      </div>

    </div>
  </main>

  <script>
    let currentChapterIdx = 0;
    let activeSubject = "db"; // Lalai kepada 'db' (Database)

    document.addEventListener("DOMContentLoaded", function() {
        // 1. Tangkap parameter subject dan chapter dari URL browser
        const urlParams = new URLSearchParams(window.location.search);
        const subjectParam = urlParams.get('subject');  // Contoh: 'db', 'cpp', atau 'coa'
        const chapterParam = urlParams.get('chapter');  // Contoh: '1', '2', '3', '4', '5'

        // 2. Gunakan data dari URL jika ada, jika tiada backup guna localStorage
        if (subjectParam) {
          activeSubject = subjectParam;
        } else {
          activeSubject = localStorage.getItem('selectedQuizSubject') || 'db';
        }

        if (chapterParam) {
          currentChapterIdx = parseInt(chapterParam) - 1; // Tukar ke 0-based index
        } else {
          currentChapterIdx = parseInt(localStorage.getItem("current_reading_chapter_idx")) || 0;
        }

        // 3. Paparkan nama tajuk bab
        const chapterName = localStorage.getItem("current_reading_chapter_name") || "Chapter Module";
        document.getElementById("chapterTitleDisplay").innerText = `Chapter ${currentChapterIdx + 1}: ${chapterName}`;
    });

    // --- FUNGSI ACTION BUTTONS ---

    function startQuiz() {
        const chapterNumber = currentChapterIdx + 1;
        
        // Selaraskan key 'db' kepada 'database' untuk sepadan dengan quizData.js
        let targetSubject = activeSubject;
        if (activeSubject === "db") {
          targetSubject = "database";
        }
        
        // Bawa pelajar ke quizStudent.html dengan parameter lengkap!
        window.location.href = `quizStudent.html?subject=${targetSubject}&chapter=${chapterNumber}`; 
    }
    
    function openSlide() {
        const chapterNumber = currentChapterIdx + 1;
        
        // Pautan fail slide disusun mengikut folder subjek & bab (Contoh: slides/db_chapter1.pdf)
        window.location.href = `slides/${activeSubject}_chapter${chapterNumber}.pdf`;
    }

    function openVideo(videoNum) {
        const chapterNumber = currentChapterIdx + 1;
        
        // Pautan fail video disusun mengikut subjek & bab (Contoh: videos/db_chapter1_video1.mp4)
        window.location.href = `videos/${activeSubject}_chapter${chapterNumber}_video${videoNum}.mp4`;
    }
  </script>
</body>
</html>
