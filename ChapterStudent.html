<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4a9a8;
      --sidebar-bg: #fff;
      --card-bg: #e0e0e0;
      --quiz-bg: #ececec;
      --accent: #5b6cee;
      --accent-hover: #4757d4;
      --text-dark: #1a1a1a;
      --text-muted: #6b6b6b;
      --sidebar-w: 90px;
      --radius-card: 16px;
      --radius-btn: 50px;
      --radius-header: 50px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 0 24px;
      gap: 8px;
      position: sticky;
      top: 0;
      height: 100vh;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s;
      width: 72px;
      text-decoration: none;
    }

    .nav-item:hover { background: #f0f0f0; }

    .nav-back {
      padding: 10px;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .nav-back svg {
      width: 30px;
      height: 30px;
      fill: var(--text-dark);
    }

    .nav-item svg {
      width: 26px;
      height: 26px;
      stroke: var(--text-dark);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item span {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 0.01em;
    }

    .nav-item.active svg { stroke: var(--accent); }
    .nav-item.active span { color: var(--accent); }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 36px 36px 36px 28px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Chapter header ── */
    .chapter-header {
      background: #d6d6d6;
      border-radius: var(--radius-header);
      padding: 16px 0;
      text-align: center;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    .chapter-header h1 {
      font-size: 24px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Content grid ── */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── Section column ── */
    .section-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 17px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── Media card ── */
    .media-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .media-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .media-card svg {
      width: 52px;
      height: 52px;
      stroke: #888;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* second video card pushed down to match design */
    .video-col .media-card:nth-child(3) {
      margin-top: 4px;
    }

    /* ── Quiz column ── */
    .quiz-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quiz-box {
      background: var(--quiz-bg);
      border-radius: var(--radius-card);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .quiz-questions {
      font-size: 18px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: 0.02em;
      text-align: center;
    }

    .btn-quiz {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.18s, transform 0.12s;
    }

    .btn-quiz:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-quiz:active { transform: translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .content-grid { grid-template-columns: 1fr; }
      .main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="nav-item nav-back" href="#">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Log out</span>
    </a>
    <a class="nav-item active" href="#">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><polyline points="6 12 10 8 14 11 18 7"/></svg>
      <span>Performance</span>
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Subject</span>
    </a>
    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M12 13v9M8 18l4 4 4-4"/></svg>
      <span>Achievement</span>
    </a>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Chapter title -->
    <div class="chapter-header">
      <h1>Chapter 1</h1>
    </div>

    <!-- 3-column grid -->
    <div class="content-grid">

      <!-- SLIDE -->
      <div class="section-col">
        <div class="section-label">Slide</div>
        <div class="media-card">
          <!-- image placeholder icon -->
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
      </div>

      <!-- VIDEO -->
      <div class="section-col video-col">
        <div class="section-label">Video</div>
        <div class="media-card">
          <!-- video placeholder icon -->
          <svg viewBox="0 0 24 24">
            <rect x="2" y="5" width="15" height="14" rx="2"/>
            <polygon points="22 7 17 12 22 17 22 7"/>
          </svg>
        </div>
        <div class="media-card">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="5" width="15" height="14" rx="2"/>
            <polygon points="22 7 17 12 22 17 22 7"/>
          </svg>
        </div>
      </div>

      <!-- QUIZ -->
      <div class="section-col quiz-col">
        <div class="section-label">Quiz</div>
        <div class="quiz-box">
          <div class="quiz-questions">10 QUESTIONS</div>
          <button class="btn-quiz">Start Quiz</button>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
