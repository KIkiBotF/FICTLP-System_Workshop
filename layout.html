<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            width: 130px;
            background-color: #ffffff;
            padding-top: 80px;
        }

        .main-content {
            flex: 1;
            background-color: #f9eaed;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: pointer;
        }

        span {
            margin-top: 8px;
            font-family: sans-serif;
            font-weight: bold;
        }
        .nav-item:hover{
            background-color: #e8f4f8;
        }
    </style>
</head>

<body>

    <aside class="sidebar">

        <div class="nav-item">
            <svg width="25" height="25" viewBox="0 0 59 59" fill="none" xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink">
                <rect width="59" height="59" fill="url(#pattern0_188_78)" />
                <defs>
                    <pattern id="pattern0_188_78" patternContentUnits="objectBoundingBox" width="1" height="1">
                        <use xlink:href="#image0_188_78" transform="scale(0.00195312)" />
                    </pattern>
                    <image id="image0_188_78" width="512" height="512" preserveAspectRatio="none"
                </defs>
            </svg>
            <span>Log Out</span>
        </div>

        <div class="nav-item">
            <svg width="32" height="32" viewBox="0 0 73 73" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M27.375 66.9167V36.5H45.625V66.9167M9.125 27.375L36.5 6.08334L63.875 27.375V60.8333C63.875 62.4467 63.2341 63.9941 62.0932 65.1349C60.9524 66.2758 59.4051 66.9167 57.7917 66.9167H15.2083C13.5949 66.9167 12.0476 66.2758 10.9068 65.1349C9.76592 63.9941 9.125 62.4467 9.125 60.8333V27.375Z"
                    stroke="#1E1E1E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span>Home</span>
        </div>

        <div class="nav-item">
            <svg width="30" height="30" viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink">
                <rect width="25" height="25" fill="url(#pattern0_375_51)" />
                <defs>
                    <pattern id="pattern0_375_51" patternContentUnits="objectBoundingBox" width="1" height="1">
                        <use xlink:href="#image0_375_51" transform="scale(0.00195312)" />
                    </pattern>
                    <image id="image0_375_51" width="512" height="512" preserveAspectRatio="none"
                </defs>
            </svg>
            <span>Performance</span>
        </div>

        <div class="nav-item">
            <svg width="35" height="35" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink">
                <rect width="52" height="52" fill="url(#pattern0_376_53)" />
                <defs>
                    <pattern id="pattern0_376_53" patternContentUnits="objectBoundingBox" width="1" height="1">
                        <use xlink:href="#image0_376_53" transform="scale(0.00195312)" />
                    </pattern>
                    <image id="image0_376_53" width="512" height="512" preserveAspectRatio="none"
            </svg>
            <span>Subject</span>
        </div>
        <div class="nav-item">
            <svg width="35" height="35" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink">
                <rect width="52" height="52" fill="url(#pattern0_376_68)" />
                <defs>
                    <pattern id="pattern0_376_68" patternContentUnits="objectBoundingBox" width="1" height="1">
                        <use xlink:href="#image0_376_68" transform="scale(0.00195312)" />
                    </pattern>
                    <image id="image0_376_68" width="512" height="512" preserveAspectRatio="none"
            </svg
            <span>Achievement</span>
        </div>
        </div>

    </aside>

    <main class="main-content">

    </main>

</body>

</html>
