    <title>Base Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            width: 130px;
            background-color: #ffffff;
            padding-top: 80px;
        }

        .main-content {
            flex: 1;
            background-color: #f9eaed;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: pointer;
        }

        span {
            margin-top: 8px;
            font-family: sans-serif;
            font-weight: bold;
        }
        .nav-item:hover{
            background-color: #e8f4f8;
        }
    </style>
