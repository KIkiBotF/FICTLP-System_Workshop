<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreKnowledge - Manage Subjects(Admin)</title>
    <style>
        /* Reset and Full Screen Layout Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* App container takes up 100% of the screen space */
        .window-frame {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 15%;
            min-width: 120px;
            max-width: 160px;
            background-color: #ffffff;
            border-right: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            align-items: center;
            flex-shrink: 0;
            height: 100%;
        }

        .nav-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
        }

        /* Active State Management for Subject Context */
        .nav-item.active {
            background-color: #d9d9d9;
        }

        /* Custom Pure CSS Icons */
        .icon {
            margin-bottom: 6px;
            display: inline-block;
            position: relative;
        }

        /* Log Out Icon */
        .icon-logout {
            width: 24px;
            height: 24px;
        }
        .icon-logout::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; width: 14px; height: 20px;
            border: 2px solid #000; border-right: none; border-radius: 2px 0 0 2px;
        }
        .icon-logout::after {
            content: '➔';
            position: absolute;
            top: 50%; right: 0; transform: translateY(-50%);
            font-size: 15px; font-weight: bold;
        }

        /* Home Icon */
        .icon-home {
            width: 24px;
            height: 22px;
            border: 2px solid #000;
            border-top: none;
            margin-top: 6px;
        }
        .icon-home::before {
            content: '';
            position: absolute;
            top: -8px; left: -2px;
            width: 16px; height: 16px;
            border-top: 2px solid #000;
            border-left: 2px solid #000;
            transform: rotate(45deg);
        }

        /* Summary Icon (Grid) */
        .icon-summary {
            width: 22px;
            height: 22px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
        }
        .icon-summary span {
            border: 2px solid #0056b3;
            background-color: #007bff;
            border-radius: 2px;
        }

        /* Announcement Icon (Globe) */
        .icon-announcement {
            width: 24px;
            height: 24px;
            border: 2px solid #000;
            border-radius: 50%;
        }
        .icon-announcement::before, .icon-announcement::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid #000; border-radius: 50%;
        }
        .icon-announcement::before { transform: scaleX(0.4); }
        .icon-announcement::after { transform: scaleY(0.4); border-radius: 0; border-left: none; border-right: none; }


        /* --- MAIN DASHBOARD CONTENT AREA --- */
        .main-content {
            flex: 1;
            background-color: #fdf8f5; /* Matching Dashboard off-white background tint */
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            overflow: hidden;
            height: 100%;
        }

        .main-content h1 {
            font-size: 42px;
            font-family: Georgia, serif;
            font-weight: bold;
            color: #1a253c;
            margin-bottom: 4px;
        }

        .main-content .subtitle {
            font-size: 14px;
            color: #d88267;
            margin-bottom: 30px;
        }

        /* --- TABLE LAYOUT MODULE --- */
        .table-container {
            width: 100%;
            max-width: 900px;
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
        }

        .table-container::-webkit-scrollbar {
            width: 6px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background-color: #dcdcdc;
            border-radius: 3px;
        }

        /* Card Frame Table wrapper style */
        .table-card-wrapper {
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06), 
                        0 4px 12px rgba(0, 0, 0, 0.03);
        }

        .subject-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        /* Course Catalog Palette Styled Header Row */
        .subject-table thead tr {
            background-color: #cbe3cc; /* Matches dashboard course catalog green */
        }

        .subject-table th {
            font-family: Georgia, serif;
            font-size: 16px;
            font-weight: bold;
            color: #1a253c;
            padding: 16px 20px;
        }

        /* Column Proportion Layout Rules */
        .subject-table th.col-id { width: 18%; }
        .subject-table th.col-name { width: 44%; }
        .subject-table th.col-enroll { width: 18%; }
        .subject-table th.col-actions { width: 20%; text-align: right; }

        .subject-table td {
            padding: 16px 20px;
            color: #555555;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        .subject-table tbody tr:last-child td {
            border-bottom: none;
        }

        .subject-id {
            font-weight: bold;
            color: #1a253c;
        }

        /* Interactive row transition element */
        .subject-table tbody tr {
            transition: background-color 0.2s ease;
        }
        .subject-table tbody tr:hover {
            background-color: #fafafa;
        }

        /* Form Inputs inside editable fields */
        .edit-input {
            width: 100%;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            background-color: #ffffff;
            color: #1a253c;
        }
        .edit-input:focus {
            outline: none;
            border-color: #9cbca4;
        }

        /* --- CONTROL INTERFACE ACTIONS --- */
        .action-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-action {
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-edit {
            background-color: #f7f7f7;
            color: #1a253c;
        }
        
        .btn-save {
            background-color: #cbe3cc;
            color: #234e25;
        }

        .btn-remove {
            background-color: #eed6c5;
            color: #613318;
        }

        .btn-action:hover {
            opacity: 0.85;
        }
        .btn-action:active {
            transform: scale(0.97);
        }

        /* Empty state notice view window */
        .empty-message {
            text-align: center;
            font-family: Georgia, serif;
            font-size: 20px;
            font-weight: bold;
            color: #d88267;
            padding: 60px 20px;
            background-color: #ffffff;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
            width: 100%;
        }

        /* Responsive Layout Rules */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .window-frame { flex-direction: column; height: auto; min-height: 100vh; }
            .sidebar {
                width: 100%; max-width: 100%; height: auto; flex-direction: row;
                justify-content: space-around; padding-top: 0; border-right: none;
                border-bottom: 1px solid #dcdcdc; position: sticky; top: 0; z-index: 100;
            }
            .nav-item { padding: 12px 5px; flex: 1; }
            .main-content { padding: 30px 20px; height: auto; }
            .main-content h1 { font-size: 32px; }
            .subject-table th, .subject-table td { padding: 12px 10px; font-size: 13px; }
            .btn-action { padding: 5px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="window-frame">
        
        <aside class="sidebar">
            <a href="logIn.html" class="nav-item" onclick="handleLogout(event)">
                <div class="icon icon-logout"></div>
                Log out
            </a>
            <a href="mainPage.html" class="nav-item">
                <div class="icon icon-home"></div>
                Home
            </a>
            <a href="dashboard.html" class="nav-item active">
                <div class="icon icon-summary">
                    <span></span><span></span><span></span><span></span>
                </div>
                Summary
            </a>
             <a href="announcement.html" class="nav-item">
                <div class="icon icon-announcement"></div>
                Announcement
            </a>
        </aside>

        <main class="main-content">
            <h1>Manage Courses</h1>
            <div class="subtitle">Modify course configuration rules and metrics:</div>

            <div class="table-container" id="tableContainer">
                <div class="table-card-wrapper">
                    <table class="subject-table" id="subjectTable">
                        <thead>
                            <tr>
                                <th class="col-id">ID</th>
                                <th class="col-name">Course Name</th>
                                <th class="col-enroll">Enrolled</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="subject-id">DITP2913</td>
                                <td class="subject-name">Database</td>
                                <td class="subject-enroll">3</td>
                                <td>
                                    <div class="action-group">
                                        <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                        <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="subject-id">DITP1113</td>
                                <td class="subject-name">C++ Programming</td>
                                <td class="subject-enroll">2</td>
                                <td>
                                    <div class="action-group">
                                        <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                        <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="subject-id">DITP3123</td>
                                <td class="subject-name">Computer Organization and Architecture</td>
                                <td class="subject-enroll">2</td>
                                <td>
                                    <div class="action-group">
                                        <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                        <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                    </div>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>
            </div>
        </main>

    </div>

    <script>
        function handleLogout(event) {
            event.preventDefault(); 
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "logIn.html";
            }
        }

        function toggleEdit(button) {
            const row = button.closest('tr');
            const idCell = row.querySelector('.subject-id');
            const nameCell = row.querySelector('.subject-name');
            const enrollCell = row.querySelector('.subject-enroll');

            if (button.classList.contains('btn-edit')) {
                button.textContent = 'Save';
                button.classList.remove('btn-edit');
                button.classList.add('btn-save');

                idCell.innerHTML = `<input type="text" class="edit-input" value="${idCell.textContent.trim()}">`;
                nameCell.innerHTML = `<input type="text" class="edit-input" value="${nameCell.textContent.trim()}">`;
                enrollCell.innerHTML = `<input type="text" class="edit-input" value="${enrollCell.textContent.trim()}">`;
            } else {
                button.textContent = 'Edit';
                button.classList.remove('btn-save');
                button.classList.add('btn-edit');

                const newId = idCell.querySelector('input').value;
                const newName = nameCell.querySelector('input').value;
                const newEnroll = enrollCell.querySelector('input').value;

                idCell.textContent = newId;
                nameCell.textContent = newName;
                enrollCell.textContent = newEnroll;
            }
        }

        function removeSubject(button) {
            if (confirm("Are you sure you want to remove this subject?")) {
                const row = button.closest('tr');
                const table = document.getElementById('subjectTable');
                
                row.remove();

                const remainingRows = table.querySelectorAll('tbody tr');
                if (remainingRows.length === 0) {
                    const container = document.getElementById('tableContainer');
                    container.innerHTML = '<div class="empty-message">No courses are currently configured in the catalog.</div>';
                }
            }
        }
    </script>
</body>
</html>
