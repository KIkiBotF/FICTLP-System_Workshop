<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subjects</title>
    <style>
        /* Reset and Base Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Outer Frame Container matching wireframe bounds */
        .window-frame {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 4 / 3;
            background-color: #ffffff;
            border: 1px solid #7f7f7f;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 15%;
            min-width: 110px;
            background-color: #ffffff;
            border-right: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
        }

        .nav-item.active {
            background-color: #d9d9d9;
        }

        /* Custom Wireframe CSS Icons */
        .icon {
            margin-bottom: 6px;
            display: inline-block;
            position: relative;
        }

        .icon-logout {
            width: 24px;
            height: 24px;
        }
        .icon-logout::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; width: 14px; height: 20px;
            border: 2px solid #000; border-right: none; border-radius: 2px 0 0 2px;
        }
        .icon-logout::after {
            content: '➔';
            position: absolute;
            top: 50%; right: 0; transform: translateY(-50%);
            font-size: 15px; font-weight: bold;
        }

        .icon-home {
            width: 24px;
            height: 22px;
            border: 2px solid #000;
            border-top: none;
            margin-top: 6px;
        }
        .icon-home::before {
            content: '';
            position: absolute;
            top: -8px; left: -2px;
            width: 16px; height: 16px;
            border-top: 2px solid #000;
            border-left: 2px solid #000;
            transform: rotate(45deg);
        }

        .icon-summary {
            width: 22px;
            height: 22px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
        }
        .icon-summary span {
            border: 2px solid #0056b3;
            background-color: #007bff;
            border-radius: 2px;
        }

        .icon-announcement {
            width: 24px;
            height: 24px;
            border: 2px solid #000;
            border-radius: 50%;
        }
        .icon-announcement::before, .icon-announcement::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid #000; border-radius: 50%;
        }
        .icon-announcement::before { transform: scaleX(0.4); }
        .icon-announcement::after { transform: scaleY(0.4); border-radius: 0; border-left: none; border-right: none; }


        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            background-color: #fbf2f2;
            padding: 30px 20px 30px 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-content h1 {
            font-size: 42px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 25px;
            text-align: center;
        }

        .table-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 15px;
            display: flex;
            flex-direction: column;
        }

        .table-container::-webkit-scrollbar {
            width: 6px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background-color: #7f7f7f;
            border-radius: 3px;
        }

        .subject-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        .subject-table th {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            padding: 0 12px 6px 12px;
            text-align: left;
        }

        /* Specific Mockup Column Alignments */
        .subject-table th.col-id { width: 18%; }
        .subject-table th.col-name { width: 42%; }
        .subject-table th.col-enroll { width: 20%; }
        .subject-table th.col-actions { width: 20%; }

        .subject-table td {
            background-color: #e3dede;
            color: #000000;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 12px;
            vertical-align: middle;
        }

        .subject-table tr td:first-child {
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
        }
        .subject-table tr td:last-child {
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        /* Form Inputs for Edit Mode */
        .edit-input {
            width: 100%;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #7f7f7f;
            border-radius: 4px;
            background-color: #ffffff;
        }

        /* Action Buttons styling */
        .action-group {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            color: #000000;
            border: none;
            border-radius: 12px;
            padding: 4px 14px;
            cursor: pointer;
        }

        .btn-edit {
            background-color: #9e9e9e;
        }
        
        .btn-save {
            background-color: #a3cfa3;
        }

        .btn-remove {
            background-color: #e58181;
        }

        .btn-action:hover {
            opacity: 0.85;
        }

        /* Empty State Warning Container */
        .empty-message {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #7f7f7f;
            margin: auto 0;
            padding: 40px 20px;
        }
    </style>
</head>
<body>

    <div class="window-frame">
        
     <aside class="sidebar">
            <a href="logIn.html" class="nav-item" onclick="handleLogout(event)">
                <div class="icon icon-logout"></div>
                Log out
            </a>
            <a href="mainPage.html" class="nav-item" style="margin-top: 15px;">
                <div class="icon icon-home"></div>
                Home
            </a>
            <a href="dashboard.html" class="nav-item active" style="margin-top: 15px;">
                <div class="icon icon-summary">
                    <span></span><span></span><span></span><span></span>
                </div>
                Summary
            </a>
             <a href="announcement.html" class="nav-item" style="margin-top: 15px;">
                <div class="icon icon-announcement"></div>
                Announcement
            </a>
        </aside>

        <main class="main-content">
            <h1>Manage Subjects</h1>

            <div class="table-container" id="tableContainer">
                <table class="subject-table" id="subjectTable">
                    <thead>
                        <tr>
                            <th class="col-id">ID</th>
                            <th class="col-name">Name</th>
                            <th class="col-enroll">Current Enroll</th>
                            <th class="col-actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="subject-id">DITP2913</td>
                            <td class="subject-name">Database</td>
                            <td class="subject-enroll">21</td>
                            <td>
                                <div class="action-group">
                                    <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                    <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="subject-id">DITP1113</td>
                            <td class="subject-name">Programming I</td>
                            <td class="subject-enroll">31</td>
                            <td>
                                <div class="action-group">
                                    <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                    <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="subject-id">...</td>
                            <td class="subject-name">Computer Architecture and Organization</td>
                            <td class="subject-enroll">23</td>
                            <td>
                                <div class="action-group">
                                    <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                    <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="subject-id">....</td>
                            <td class="subject-name">...</td>
                            <td class="subject-enroll">...</td>
                            <td>
                                <div class="action-group">
                                    <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                    <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="subject-id">....</td>
                            <td class="subject-name">.......................</td>
                            <td class="subject-enroll">...</td>
                            <td>
                                <div class="action-group">
                                    <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                    <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="subject-id">...</td>
                            <td class="subject-name">.......................</td>
                            <td class="subject-enroll">..</td>
                            <td>
                                <div class="action-group">
                                    <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                    <button class="btn-action btn-remove" onclick="removeSubject(this)">Remove</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

    </div>

    <script>

        function handleLogout(event) {
            event.preventDefault(); // Prevents instant empty link jumps
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "logIn.html";
            }
        }

        function toggleEdit(button) {
            const row = button.closest('tr');
            const idCell = row.querySelector('.subject-id');
            const nameCell = row.querySelector('.subject-name');
            const enrollCell = row.querySelector('.subject-enroll');

            if (button.classList.contains('btn-edit')) {
                // Change into Saving/Editable configuration
                button.textContent = 'Save';
                button.classList.remove('btn-edit');
                button.classList.add('btn-save');

                idCell.innerHTML = `<input type="text" class="edit-input" value="${idCell.textContent.trim()}">`;
                nameCell.innerHTML = `<input type="text" class="edit-input" value="${nameCell.textContent.trim()}">`;
                enrollCell.innerHTML = `<input type="text" class="edit-input" value="${enrollCell.textContent.trim()}">`;
            } else {
                // Return to Read-Only Mode
                button.textContent = 'Edit';
                button.classList.remove('btn-save');
                button.classList.add('btn-edit');

                const newId = idCell.querySelector('input').value;
                const newName = nameCell.querySelector('input').value;
                const newEnroll = enrollCell.querySelector('input').value;

                idCell.textContent = newId;
                nameCell.textContent = newName;
                enrollCell.textContent = newEnroll;
            }
        }

        function removeSubject(button) {
            if (confirm("Are you sure you want to remove this subject?")) {
                const row = button.closest('tr');
                const table = document.getElementById('subjectTable');
                
                row.remove();

                const remainingRows = table.querySelectorAll('tbody tr');
                if (remainingRows.length === 0) {
                    const container = document.getElementById('tableContainer');
                    container.innerHTML = '<div class="empty-message">No subjects available</div>';
                }
            }
        }
    </script>
</body>
</html>
