<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Announcement</title>
    <style>
        /* Reset and Base Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Outer Frame Container matching wireframe bounds */
        .window-frame {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 4 / 3;
            background-color: #ffffff;
            border: 1px solid #7f7f7f;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 15%;
            min-width: 110px;
            background-color: #ffffff;
            border-right: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
        }

        /* Announcement Tab Active Highlight State */
        .nav-item.active {
            background-color: #d9d9d9;
        }

        /* Custom Wireframe CSS Icons */
        .icon {
            margin-bottom: 6px;
            display: inline-block;
            position: relative;
        }

        /* Log Out Icon */
        .icon-logout {
            width: 24px;
            height: 24px;
        }
        .icon-logout::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; width: 14px; height: 20px;
            border: 2px solid #000; border-right: none; border-radius: 2px 0 0 2px;
        }
        .icon-logout::after {
            content: '➔';
            position: absolute;
            top: 50%; right: 0; transform: translateY(-50%);
            font-size: 15px; font-weight: bold;
        }

        /* Home Icon */
        .icon-home {
            width: 24px;
            height: 22px;
            border: 2px solid #000;
            border-top: none;
            margin-top: 6px;
        }
        .icon-home::before {
            content: '';
            position: absolute;
            top: -8px; left: -2px;
            width: 16px; height: 16px;
            border-top: 2px solid #000;
            border-left: 2px solid #000;
            transform: rotate(45deg);
        }

        /* Summary Icon (Grid) */
        .icon-summary {
            width: 22px;
            height: 22px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
        }
        .icon-summary span {
            border: 2px solid #000;
            background-color: #007bff;
            border-radius: 2px;
        }

        /* Announcement Icon (Globe) */
        .icon-announcement {
            width: 24px;
            height: 24px;
            border: 2px solid #0056b3;
            border-radius: 50%;
        }
        .icon-announcement::before, .icon-announcement::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid #0056b3; border-radius: 50%;
        }
        .icon-announcement::before { transform: scaleX(0.4); }
        .icon-announcement::after { transform: scaleY(0.4); border-radius: 0; border-left: none; border-right: none; }


        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            background-color: #fbf2f2; /* Pale pink context tint */
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-content h1 {
            font-size: 42px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 25px;
            text-align: left;
        }

        /* --- ANNOUNCEMENT COMPONENT --- */
        .announcement-box {
            background-color: #7f7f7f; /* Slate grey container block */
            width: 100%;
            max-width: 620px;
            height: 220px;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Stylized Textarea replacing static text for interactive input */
        .announcement-input {
            width: 100%;
            height: 110px;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: #000000;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
        }

        /* Send Actions Wrapper Row */
        .action-row {
            display: flex;
            justify-content: flex-end;
        }

        /* Send Pill Button Configuration */
        .btn-send {
            background-color: #a7c5c5; /* Soft light blue/grey pill background */
            color: #000000;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            padding: 5px 16px 5px 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.15s ease;
        }

        .btn-send:hover {
            background-color: #92b3b3;
        }

        /* Paper Airplane Icon vector emulation */
        .icon-send-arrow {
            font-size: 11px;
            transform: rotate(-15deg);
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="window-frame">
        
        <aside class="sidebar">
            <a href="index.html" class="nav-item">
                <div class="icon icon-logout"></div>
                Log out
            </a>
            <a href="home.html" class="nav-item" style="margin-top: 15px;">
                <div class="icon icon-home"></div>
                Home
            </a>
            <a href="summary.html" class="nav-item" style="margin-top: 15px;">
                <div class="icon icon-summary">
                    <span></span><span></span><span></span><span></span>
                </div>
                Summary
            </a>
            <a href="announcement.html" class="nav-item active" style="margin-top: 15px;">
                <div class="icon icon-announcement"></div>
                Annoucement
            </a>
        </aside>

        <main class="main-content">
            <h1>Global Announcement</h1>

            <div class="announcement-box">
                <textarea 
                    class="announcement-input" 
                    id="announcementText" 
                    placeholder="Type your message here...">&ldquo;Welcome to our website&rdquo;</textarea>
                
                <div class="action-row">
                    <button class="btn-send" onclick="broadcastAnnouncement()">
                        <span class="icon-send-arrow">➔</span> Send to All
                    </button>
                </div>
            </div>
        </main>

    </div>

    <script>
        function broadcastAnnouncement() {
            const message = document.getElementById('announcementText').value.trim();
            
            if (message === "" || message === '“Welcome to our website”') {
                alert("Please type a valid announcement message before broadcasting.");
                return;
            }
            
            // Simulates an immediate production broadcast transmission 
            alert(`Success! The announcement has been sent to all users:\n\n${message}`);
        }
    </script>
</body>
</html>
