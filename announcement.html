<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreKnowledge - Global Announcement(Admin)</title>
    <style>
        /* Reset and Full Screen Layout Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* App container takes up 100% of the screen space */
        .window-frame {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 15%;
            min-width: 120px;
            max-width: 160px;
            background-color: #ffffff;
            border-right: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            align-items: center;
            flex-shrink: 0;
            height: 100%;
        }

        .nav-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
        }

        /* Active highlight state matching system layout */
        .nav-item.active {
            background-color: #d9d9d9;
        }

        /* Custom Pure CSS Icons */
        .icon {
            margin-bottom: 6px;
            display: inline-block;
            position: relative;
        }

        /* Log Out Icon */
        .icon-logout {
            width: 24px;
            height: 24px;
        }
        .icon-logout::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; width: 14px; height: 20px;
            border: 2px solid #000; border-right: none; border-radius: 2px 0 0 2px;
        }
        .icon-logout::after {
            content: '➔';
            position: absolute;
            top: 50%; right: 0; transform: translateY(-50%);
            font-size: 15px; font-weight: bold;
        }

        /* Home Icon */
        .icon-home {
            width: 24px;
            height: 22px;
            border: 2px solid #000;
            border-top: none;
            margin-top: 6px;
        }
        .icon-home::before {
            content: '';
            position: absolute;
            top: -8px; left: -2px;
            width: 16px; height: 16px;
            border-top: 2px solid #000;
            border-left: 2px solid #000;
            transform: rotate(45deg);
        }

        /* Summary Icon */
        .icon-summary {
            width: 22px;
            height: 22px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
        }
        .icon-summary span {
            border: 2px solid #000;
            background-color: #007bff;
            border-radius: 2px;
        }

        /* Announcement Icon Globe with blue highlight accent */
        .icon-announcement {
            width: 24px;
            height: 24px;
            border: 2px solid #0056b3;
            border-radius: 50%;
        }
        .icon-announcement::before, .icon-announcement::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid #0056b3; border-radius: 50%;
        }
        .icon-announcement::before { transform: scaleX(0.4); }
        .icon-announcement::after { transform: scaleY(0.4); border-radius: 0; border-left: none; border-right: none; }


        /* --- MAIN DASHBOARD CONTENT AREA --- */
        .main-content {
            flex: 1;
            background-color: #fdf8f5; /* Workspace warm white background tint */
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            overflow: hidden;
            height: 100%;
        }

        .main-content h1 {
            font-size: 42px;
            font-family: Georgia, serif;
            font-weight: bold;
            color: #1a253c;
            margin-bottom: 4px;
        }

        .main-content .subtitle {
            font-size: 14px;
            color: #d88267; /* Terracotta highlight accent */
            margin-bottom: 30px;
        }

        /* --- ANNOUNCEMENT CONTAINER MODULE --- */
        .announcement-box {
            background-color: #e9ecef; /* Deepened greyish slate tone for maximum visibility */
            width: 100%;
            max-width: 680px;
            height: 310px;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08), 
                        0 4px 14px rgba(0, 0, 0, 0.04);
            border: 1px solid #ced4da; /* Distinct border structure */
            transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        /* Interactive focus shadow shift */
        .announcement-box:focus-within {
            border-color: #adb5bd;
            background-color: #e2e6ea;
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.1), 
                        0 4px 16px rgba(0, 0, 0, 0.05);
        }

        /* Embedded high-contrast input card */
        .input-container {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 16px;
            height: 190px;
            width: 100%;
        }

        /* Workspace Textarea Control */
        .announcement-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: #212529;
            font-family: inherit;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
        }
        
        .announcement-input::placeholder {
            color: #868e96;
            font-weight: 400;
        }

        /* Send Actions Footer Row */
        .action-row {
            display: flex;
            justify-content: flex-end;
            padding-top: 12px;
        }

        /* Styled Action Button using Light Sage Accent */
        .btn-send {
            background-color: #cbe3cc; /* Signature sage green */
            color: #234e25;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            transition: background-color 0.2s ease, transform 0.1s, box-shadow 0.2s;
        }

        .btn-send:hover {
            background-color: #b9d7ba;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .btn-send:active {
            transform: scale(0.97);
        }

        /* Paper Airplane Arrow Translation */
        .icon-send-arrow {
            font-size: 11px;
            transform: rotate(-15deg);
            display: inline-block;
        }

        /* Responsive Layout Breakpoints */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .window-frame { flex-direction: column; height: auto; min-height: 100vh; }
            .sidebar {
                width: 100%; max-width: 100%; height: auto; flex-direction: row;
                justify-content: space-around; padding-top: 0; border-right: none;
                border-bottom: 1px solid #dcdcdc; position: sticky; top: 0; z-index: 100;
            }
            .nav-item { padding: 12px 5px; flex: 1; }
            .main-content { padding: 30px 20px; height: auto; }
            .main-content h1 { font-size: 32px; }
            .announcement-box { height: 270px; padding: 16px; }
            .input-container { height: 160px; }
            .announcement-input { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="window-frame">
        
        <aside class="sidebar">
            <a href="logIn.html" class="nav-item" onclick="handleLogout(event)">
                <div class="icon icon-logout"></div>
                Log out
            </a>
            <a href="mainPage.html" class="nav-item">
                <div class="icon icon-home"></div>
                Home
            </a>
            <a href="dashboard.html" class="nav-item">
                <div class="icon icon-summary">
                    <span></span><span></span><span></span><span></span>
                </div>
                Summary
            </a>
            <a href="announcement.html" class="nav-item active">
                <div class="icon icon-announcement"></div>
                Announcement
            </a>
        </aside>

        <main class="main-content">
            <h1>Global Announcement</h1>
            <div class="subtitle">Broadcast important system-wide headers, maintenance alerts, or welcoming updates here:</div>

            <div class="announcement-box">
                <div class="input-container">
                    <textarea 
                        class="announcement-input" 
                        id="announcementText" 
                        placeholder="Type your system message here...">&ldquo;Welcome to our website&rdquo;</textarea>
                </div>
                
                <div class="action-row">
                    <button class="btn-send" onclick="broadcastAnnouncement()">
                        <span class="icon-send-arrow">➔</span> Send to All Users
                    </button>
                </div>
            </div>
        </main>

    </div>

    <script>
        function handleLogout(event) {
            event.preventDefault(); 
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "logIn.html";
            }
        }

        function broadcastAnnouncement() {
            const message = document.getElementById('announcementText').value.trim();
            
            if (message === "") {
                alert("Please type a valid announcement message before broadcasting.");
                return;
            }
            
            // Simulates an immediate operational live database broadcast alert
            alert(`Success! The announcement has been sent to all system accounts:\n\n${message}`);
        }
    </script>
</body>
</html>
