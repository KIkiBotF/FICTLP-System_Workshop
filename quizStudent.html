    let activeSubject = "cpp";
    let currentChapter = "1";
    let questionsList = [];
    let currentQuestionIndex = 0;
    
    // Array to track student responses (null means unanswered)
    let studentAnswers = Array(10).fill(null);
    // Array to evaluate whether a question has been finalized/checked by the "Next" action
    let evaluatedQuestions = Array(10).fill(false);

    document.addEventListener("DOMContentLoaded", function() {
      const urlParams = new URLSearchParams(window.location.search);
      const subjectParam = urlParams.get('subject');
      const chapterParam = urlParams.get('chapter');
      
      if (subjectParam === "cpp" || subjectParam === "coa" || subjectParam === "database") {
        activeSubject = subjectParam;
      }
      
      if (chapterParam && quizMasterDatabase[activeSubject][chapterParam]) {
        currentChapter = chapterParam;
      }

      let subjectDisplay = "";
      if (activeSubject === "cpp") subjectDisplay = "C++ Programming";
      else if (activeSubject === "coa") subjectDisplay = "Computer Organization & Architecture (COA)";
      else subjectDisplay = "Database Systems";
      
      const chapterData = quizMasterDatabase[activeSubject][currentChapter];
      document.getElementById("quizTitleDisplay").innerText = `${subjectDisplay} - ${chapterData.title}`;
      
      questionsList = chapterData.questions;

      buildSidebarNav();
      loadQuestion(0);
    });

    // Renders the left Navigation sidebar panel matching layout specs
    function buildSidebarNav() {
      const navContainer = document.getElementById("questionNavContainer");
      navContainer.innerHTML = "";

      questionsList.forEach((_, index) => {
        const row = document.createElement("div");
        row.className = "nav-row";
        row.id = `navRow-${index}`;
        row.onclick = () => loadQuestion(index);

        const label = document.createElement("span");
        label.className = "q-label";
        label.innerText = `Question ${index + 1}`;

        const circle = document.createElement("div");
        circle.className = "status-circle";
        circle.id = `statusCircle-${index}`;

        row.appendChild(label);
        row.appendChild(circle);
        navContainer.appendChild(row);
      });
    }

    // Displays the current selected question index into the Workspace area
    function loadQuestion(index) {
      currentQuestionIndex = index;

      // Update row selection color indicator on left panel
      document.querySelectorAll(".nav-row").forEach(r => r.classList.remove("current"));
      document.getElementById(`navRow-${index}`).classList.add("current");

      const currentQuestion = questionsList[index];

      // Insert question string data
      document.getElementById("qNumberAndText").innerText = `${index + 1}. ${currentQuestion.q}`;

      // Check for code snippets presence
      const codeBox = document.getElementById("codeImageBox");
      if (currentQuestion.code) {
        codeBox.classList.remove("hidden");
        document.getElementById("codeDisplay").innerText = currentQuestion.code;
      } else {
        codeBox.classList.add("hidden");
      }

      // Flush previous workspace elements or display static evaluation responses
      const feedbackContainer = document.getElementById("feedbackContainer");
      feedbackContainer.innerHTML = "";

      if (evaluatedQuestions[index]) {
        showFeedbackMessage(studentAnswers[index] === currentQuestion.correct);
      }

      // Populate choices container mapping rules
      const optionsContainer = document.getElementById("optionsContainer");
      optionsContainer.innerHTML = "";

      const prefixes = ["a. ", "b. ", "c. ", "d. "];
      currentQuestion.a.forEach((optionText, optIdx) => {
        const label = document.createElement("label");
        label.className = "option-item";
        
        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "quiz_option";
        radio.value = optIdx;
        
        // If question has been evaluated previously, freeze input interactions
        if (evaluatedQuestions[index]) {
          radio.disabled = true;
          label.style.cursor = "default";
        } else {
          radio.onclick = () => selectOption(optIdx);
        }

        const dot = document.createElement("span");
        dot.className = "radio-dot";

        const textSpan = document.createElement("span");
        textSpan.className = "option-text";
        textSpan.innerHTML = `<b>${prefixes[optIdx]}</b>${optionText}`;

        // Re-apply selection state data if user is stepping back/forward
        if (studentAnswers[index] === optIdx) {
          label.classList.add("checked");
          radio.checked = true;
        }

        label.appendChild(radio);
        label.appendChild(dot);
        label.appendChild(textSpan);
        optionsContainer.appendChild(label);
      });

      // Update button labels on final array step
      const actionBtn = document.getElementById("actionBtn");
      if (index === questionsList.length - 1) {
        actionBtn.innerText = "Finish";
      } else {
        actionBtn.innerText = "Next";
      }
    }

    // Handles option checked changes before evaluation
    function selectOption(optIdx) {
      if (evaluatedQuestions[currentQuestionIndex]) return;

      const items = document.querySelectorAll(".option-item");
      items.forEach(item => item.classList.remove("checked"));

      const activeRadio = document.querySelector(`input[value="${optIdx}"]`);
      if (activeRadio) {
        activeRadio.parentElement.classList.add("checked");
      }

      // Temporary answer save (Does not trigger circle state yet)
      studentAnswers[currentQuestionIndex] = optIdx;
    }

    // Clears check state for current active layout context
    function clearSelection() {
      if (evaluatedQuestions[currentQuestionIndex]) {
        alert("This question has already been evaluated and locked.");
        return;
      }
      
      studentAnswers[currentQuestionIndex] = null;
      document.querySelectorAll(".option-item").forEach(item => item.classList.remove("checked"));
      document.querySelectorAll('input[name="quiz_option"]').forEach(radio => radio.checked = false);
    }

    // Displays standard text message in right workspace panel
    function showFeedbackMessage(isCorrect) {
      const feedbackContainer = document.getElementById("feedbackContainer");
      feedbackContainer.innerHTML = "";

      const msgDiv = document.createElement("div");
      if (isCorrect) {
        msgDiv.className = "feedback-msg correct";
        msgDiv.innerText = "✓ Your Answer is CORRECT!";
      } else {
        msgDiv.className = "feedback-msg wrong";
        msgDiv.innerText = "✗ Your Answer is INCORRECT!";
      }
      feedbackContainer.appendChild(msgDiv);
    }

    // CORE LOGIC: Evaluates question correctness on Next click, changes sidebar circle, then proceeds
    function handleAction() {
      if (studentAnswers[currentQuestionIndex] === null) {
        alert("Please pick an option before proceeding!");
        return;
      }

      // Evaluation Block: Executes on fresh button press submissions
      if (!evaluatedQuestions[currentQuestionIndex]) {
        evaluatedQuestions[currentQuestionIndex] = true;
        
        const correctIdx = questionsList[currentQuestionIndex].correct;
        const isCorrect = (studentAnswers[currentQuestionIndex] === correctIdx);
        
        // 1. Render workspace feedback text alert
        showFeedbackMessage(isCorrect);

        // 2. Inject green check / red cross indicators directly into left sidebar circles
        const circle = document.getElementById(`statusCircle-${currentQuestionIndex}`);
        if (isCorrect) {
          circle.className = "status-circle correct";
          circle.innerText = "✓";
          circle.style.color = "#ffffff";
          circle.style.fontSize = "12px";
          circle.style.fontWeight = "bold";
        } else {
          circle.className = "status-circle wrong";
          circle.innerText = "✗";
          circle.style.color = "#ffffff";
          circle.style.fontSize = "12px";
          circle.style.fontWeight = "bold";
        }

        // Lock current radio items instantly
        document.querySelectorAll('input[name="quiz_option"]').forEach(radio => radio.disabled = true);

        // Brief delay (1.2 seconds) to let user observe result metrics before transitioning
        setTimeout(() => {
          proceedToNextSteps();
        }, 1200);
      } else {
        // If navigating back to an already checked item, click passes immediately
        proceedToNextSteps();
      }
    }

    // Handles progression routing
    function proceedToNextSteps() {
      if (currentQuestionIndex < questionsList.length - 1) {
        loadQuestion(currentQuestionIndex + 1);
      } else {
        calculateAndShowFinalResults();
      }
    }

    // Aggregates scoring rules and fires overlay card
    function calculateAndShowFinalResults() {
      let finalScore = 0;
      questionsList.forEach((q, idx) => {
        if (studentAnswers[idx] === q.correct) {
          finalScore++;
        }
      });

      document.getElementById("finalScoreDisplay").innerText = `${finalScore}/10`;
      
      const feedbackText = document.getElementById("resultFeedback");
      if (finalScore === 10) {
        feedbackText.innerText = "Exceptional performance! You achieved a perfect score!";
      } else if (finalScore >= 5) {
        feedbackText.innerText = "Congratulations! You passed this module quiz!";
      } else {
        feedbackText.innerText = "Keep learning! Review the chapter slides and try again to improve.";
      }

      document.getElementById("resultOverlay").style.display = "flex";
    }

    function exitQuiz() {
      window.location.href = "CoursePageStudent.html";
    }
  </script>
</body>
</html>
