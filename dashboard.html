<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreKnowledge - Dashboard Summary(Admin)</title>
    <style>
        /* Reset and Full Screen Layout Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* App container takes up 100% of the screen space */
        .window-frame {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 15%;
            min-width: 120px;
            max-width: 160px;
            background-color: #ffffff;
            border-right: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            align-items: center;
            flex-shrink: 0;
            height: 100%;
        }

        .nav-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
            background: none;
            border: none;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
        }

        /* Active State (Summary Tab) */
        .nav-item.active {
            background-color: #d9d9d9;
        }

        /* Custom Pure CSS Icons */
        .icon {
            margin-bottom: 6px;
            display: inline-block;
            position: relative;
        }

        /* Log Out Icon */
        .icon-logout {
            width: 24px;
            height: 24px;
        }
        .icon-logout::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; width: 14px; height: 20px;
            border: 2px solid #000; border-right: none; border-radius: 2px 0 0 2px;
        }
        .icon-logout::after {
            content: '➔';
            position: absolute;
            top: 50%; right: 0; transform: translateY(-50%);
            font-size: 15px; font-weight: bold;
        }

        /* Home Icon */
        .icon-home {
            width: 24px;
            height: 22px;
            border: 2px solid #000;
            border-top: none;
            margin-top: 6px;
        }
        .icon-home::before {
            content: '';
            position: absolute;
            top: -8px; left: -2px;
            width: 16px; height: 16px;
            border-top: 2px solid #000;
            border-left: 2px solid #000;
            transform: rotate(45deg);
        }

        /* Summary Icon (Grid) */
        .icon-summary {
            width: 22px;
            height: 22px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
        }
        .icon-summary span {
            border: 2px solid #0056b3;
            background-color: #007bff;
            border-radius: 2px;
        }

        /* Announcement Icon (Globe) */
        .icon-announcement {
            width: 24px;
            height: 24px;
            border: 2px solid #000;
            border-radius: 50%;
        }
        .icon-announcement::before, .icon-announcement::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid #000; border-radius: 50%;
        }
        .icon-announcement::before { transform: scaleX(0.4); }
        .icon-announcement::after { transform: scaleY(0.4); border-radius: 0; border-left: none; border-right: none; }


        /* --- MAIN DASHBOARD CONTENT --- */
        .main-content {
            flex: 1;
            background-color: #fdf8f5; /* Off-white background tint */
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            overflow-y: auto;
            height: 100%;
        }

        .main-content h1 {
            font-size: 42px;
            font-family: Georgia, serif;
            font-weight: bold;
            color: #1a253c;
            margin-bottom: 4px;
        }

        .main-content .subtitle {
            font-size: 14px;
            color: #d88267;
            margin-bottom: 35px;
        }

        /* Subject-Style Stacked Card Setup */
        .cards-stack {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .subject-style-card {
            background-color: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            width: 100%;
            
            /* --- CARD SHADOW EFFECT --- */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08), 
                        0 4px 10px rgba(0, 0, 0, 0.04);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        /* Smooth Lift Effect on Hover */
        .subject-style-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.12), 
                        0 6px 15px rgba(0, 0, 0, 0.06);
        }

        /* Headers */
        .card-header {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #1a253c;
        }

        .card-header h2 {
            font-size: 22px;
            font-family: Georgia, serif;
            font-weight: bold;
        }

        .card-header .meta-tag {
            font-size: 13px;
            font-style: italic;
            opacity: 0.7;
        }

        /* Colors matched to mockup */
        .header-students { background-color: #eed6c5; }
        .header-lecturers { background-color: #c9e6f2; }
        .header-subjects { background-color: #cbe3cc; }

        /* Card Content Row */
        .card-body {
            padding: 24px;
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .details-list {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .details-list li {
            font-size: 15px;
            color: #555555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .details-list li::before {
            content: "●";
            color: #9cbca4;
            font-size: 12px;
        }

        /* Counter numbers badge display */
        .metric-badge {
            font-size: 32px;
            font-weight: bold;
            color: #1a253c;
            background-color: #f7f7f7;
            padding: 6px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="window-frame">
        
        <aside class="sidebar">
            <a href="logIn.html" class="nav-item" onclick="handleLogout(event)">
                <div class="icon icon-logout"></div>
                Log out
            </a>
            <a href="mainPage.html" class="nav-item" style="margin-top: 15px;">
                <div class="icon icon-home"></div>
                Home
            </a>
            <button class="nav-item active" style="margin-top: 15px;">
                <div class="icon icon-summary">
                    <span></span><span></span><span></span><span></span>
                </div>
                Summary
            </button>
             <a href="announcement.html" class="nav-item" style="margin-top: 15px;">
                <div class="icon icon-announcement"></div>
                Announcement
            </a>
        </aside>

        <main class="main-content">
            <h1>Dashboard Summary</h1>
            <div class="subtitle">System overview metrics:</div>

            <div class="cards-stack">
                
                <a href="manageStudents.html" class="subject-style-card">
                    <div class="card-header header-students">
                        <h2>Students Directory</h2>
                    </div>
                    <div class="card-body">
                        <ul class="details-list">
                            <li>Manage Students</li>
                            
                        </ul>
                        <div class="metric-badge" id="student-count"></div>
                    </div>
                </a>

                <a href="manageLecturers.html" class="subject-style-card">
                    <div class="card-header header-lecturers">
                        <h2>Lecturer Directory</h2>
                        
                    </div>
                    <div class="card-body">
                        <ul class="details-list">
                            <li>Manage Lecturers</li>
                           
                        </ul>
                        <div class="metric-badge" id="lecturer-count"></div>
                    </div>
                </a>

                <a href="manageSubjects.html" class="subject-style-card">
                    <div class="card-header header-subjects">
                        <h2>Course Catalog</h2>
                        
                    </div>
                    <div class="card-body">
                        <ul class="details-list">
                            <li>Manage Courses</li>
                            
                        </ul>
                        <div class="metric-badge" id="subject-count"></div>
                    </div>
                </a>

            </div>
        </main>

    </div>

    <script>
        function handleLogout(event) {
            event.preventDefault(); 
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "logIn.html";
            }
        }
    </script>
</body>
</html>
