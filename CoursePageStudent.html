<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Module</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #c9b8bc;
      --sidebar-bg: #fff;
      --card-bg: #fff;
      --preview-bg: #ede5e7;
      --accent: #5b6cee;
      --accent-hover: #4757d4;
      --text-dark: #1a1a1a;
      --text-muted: #6b6b6b;
      --sidebar-icon: #1a1a1a;
      --sidebar-w: 90px;
      --radius-card: 18px;
      --radius-btn: 50px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 0 24px;
      gap: 8px;
      position: sticky;
      top: 0;
      height: 100vh;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.18s;
      width: 72px;
      text-decoration: none;
    }

    .nav-item:hover { background: #f0f0f0; }

    .nav-item svg {
      width: 26px;
      height: 26px;
      stroke: var(--sidebar-icon);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-item span {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 0.01em;
    }

    /* highlight active */
    .nav-item.active svg { stroke: var(--accent); }
    .nav-item.active span { color: var(--accent); }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 40px 36px 40px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: -0.02em;
    }

    .btn-start {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      padding: 9px 22px;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.18s, transform 0.12s;
      white-space: nowrap;
    }

    .btn-start:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-start:active { transform: translateY(0); }

    .progress-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Content grid ── */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 24px;
      align-items: start;
    }

    /* ── Chapter list ── */
    .chapter-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chapter-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      padding: 22px 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .chapter-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.10);
    }

    .chapter-card:active { transform: translateY(0); }

    .chapter-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-width: 26px;
    }

    .chapter-name {
      font-size: 17px;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }

    .chapter-status {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #ddd;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chapter-status.done {
      border-color: var(--accent);
      background: var(--accent);
    }

    .chapter-status.done::after {
      content: '';
      display: block;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* ── Poor Chapter panel ── */
    .poor-panel {
      background: var(--preview-bg);
      border-radius: var(--radius-card);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .poor-panel-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: 0.01em;
    }

    .poor-item {
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .poor-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e05a5a;
      flex-shrink: 0;
    }

    .poor-item-text {
      flex: 1;
    }

    .poor-item-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .poor-item-reason {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .poor-score {
      font-size: 13px;
      font-weight: 800;
      color: #e05a5a;
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .content-grid { grid-template-columns: 1fr; }
      .preview-panel { display: none; }
      .main { padding: 24px 18px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a class="nav-item" href="#">
      <!-- Log out -->
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Log out</span>
    </a>
    <a class="nav-item active" href="#">
      <!-- Home -->
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-item" href="#">
      <!-- Performance -->
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><polyline points="6 12 10 8 14 11 18 7"/></svg>
      <span>Performance</span>
    </a>
    <a class="nav-item" href="#">
      <!-- Subject -->
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Subject</span>
    </a>
    <a class="nav-item" href="#">
      <!-- Achievement -->
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M12 13v9M8 18l4 4 4-4"/></svg>
      <span>Achievement</span>
    </a>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div>
      <div class="page-header">
        <h1>Welcome Back to <em style="font-style:normal">course name</em></h1>
        <button class="btn-start">Start Module</button>
      </div>
      <p class="progress-label" style="margin-top:6px">Current Progress: Module (0%)</p>
    </div>

    <div class="content-grid">
      <!-- Chapters -->
      <div class="chapter-list">
        <div class="chapter-card">
          <span class="chapter-num">01</span>
          <span class="chapter-name">Chapter 1</span>
          <span class="chapter-status"></span>
        </div>
        <div class="chapter-card">
          <span class="chapter-num">02</span>
          <span class="chapter-name">Chapter 2</span>
          <span class="chapter-status"></span>
        </div>
        <div class="chapter-card">
          <span class="chapter-num">03</span>
          <span class="chapter-name">Chapter 3</span>
          <span class="chapter-status"></span>
        </div>
        <div class="chapter-card">
          <span class="chapter-num">04</span>
          <span class="chapter-name">Chapter 4</span>
          <span class="chapter-status"></span>
        </div>
        <div class="chapter-card">
          <span class="chapter-num">05</span>
          <span class="chapter-name">Chapter 5</span>
          <span class="chapter-status"></span>
        </div>
      </div>

      <!-- Poor Chapter Panel -->
      <div class="poor-panel">
        <div class="poor-panel-title">Poor Chapter Display</div>
        <div class="poor-item">
          <div class="poor-dot"></div>
          <div class="poor-item-text">
            <div class="poor-item-name">Chapter 2</div>
            <div class="poor-item-reason">Low quiz score</div>
          </div>
          <span class="poor-score">32%</span>
        </div>
        <div class="poor-item">
          <div class="poor-dot"></div>
          <div class="poor-item-text">
            <div class="poor-item-name">Chapter 4</div>
            <div class="poor-item-reason">Incomplete exercises</div>
          </div>
          <span class="poor-score">45%</span>
        </div>
        <div class="poor-item">
          <div class="poor-dot"></div>
          <div class="poor-item-text">
            <div class="poor-item-name">Chapter 5</div>
            <div class="poor-item-reason">Not attempted</div>
          </div>
          <span class="poor-score">0%</span>
        </div>
      </div>
    </div>
  </main>



</body>
</html>
