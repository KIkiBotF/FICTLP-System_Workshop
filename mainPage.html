<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main page - Admin</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Outer Frame Context Label */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        .page-label {
            font-size: 18px;
            color: #b3b3b3;
            margin-bottom: 8px;
            font-weight: 500;
            padding-left: 2px;
        }

        /* Main Wireframe Container */
        .container {
            background-color: #ffffff;
            border: 1px solid #7f7f7f;
            width: 100%;
            aspect-ratio: 4 / 3; /* Matches the layout proportions of the image */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        /* Log Out Button Components */
        .logout-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            background: none;
            border: none;
            text-decoration: none;
            color: #000000;
        }

        /* Recreating the specific logout SVG icon */
        .logout-icon {
            width: 32px;
            height: 32px;
            position: relative;
            margin-bottom: 4px;
        }

        .logout-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 22px;
            height: 32px;
            border: 2.5px solid #000000;
            border-right: none;
            border-radius: 4px 0 0 4px;
        }

        .logout-icon::after {
            content: '➔';
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            font-size: 20px;
            font-weight: bold;
        }

        .logout-text {
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* System Name Header Box */
        .system-banner {
            background-color: #d9d9d9;
            width: 80%;
            max-width: 600px;
            padding: 35px 20px;
            text-align: center;
            margin-top: 25px;
            margin-bottom: 30px;
        }

        .system-banner h1 {
            font-size: 38px;
            font-weight: 800;
            color: #000000;
            letter-spacing: -0.5px;
        }

        /* Welcome Text block */
        .welcome-block {
            text-align: center;
            margin-bottom: 35px;
        }

        .welcome-block h2 {
            font-size: 32px;
            font-weight: 800;
            color: #000000;
            margin-bottom: 4px;
        }

        .welcome-block p {
            font-size: 18px;
            color: #333333;
            font-weight: 400;
        }

        /* Action Buttons Area */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 300px;
        }

        /* Styled both button elements and link elements acting as buttons */
        .btn {
            display: block;
            text-decoration: none;
            background-color: #5364f4;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            padding: 12px 20px;
            border: 2px solid #000000;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #4150d1;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="page-label">Main page - Admin</div>

        <div class="container">
            
            <a href="logIn.html" class="logout-btn" aria-label="Log out" onclick="handleLogout(event)">
                <div class="logout-icon"></div>
                <span class="logout-text">Log out</span>
            </a>

            <div class="system-banner">
                <h1>System name</h1>
            </div>

            <div class="welcome-block">
                <h2>Welcome Back!</h2>
                <p>username....</p>
            </div>

            <div class="button-group">
                <a href="dashboard.html" class="btn">Summary</a>
                
                <div class="button-group">
                <a href="announcement.html" class="btn">Announcement</a>
            </div>

        </div>
    </div>

    <script>
          function handleLogout(event) {
            event.preventDefault(); // Prevents instant empty link jumps
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "logIn.html";
            }
        }
    </script>

</body>
</html>
