<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreKnowledge - Manage Lecturers(Admin)</title>
    <style>
        /* Reset and Full Screen Layout Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* App container takes up 100% of the screen space */
        .window-frame {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION CORE --- */
        .sidebar {
            width: 15%;
            min-width: 120px;
            max-width: 160px;
            background-color: #ffffff;
            border-right: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            align-items: center;
            flex-shrink: 0;
            height: 100%;
        }

        .sidebar nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item {
            width: 100%;
            height: 85px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
            cursor: pointer;
            text-decoration: none;
            color: #000000;
            background: none;
            border: none;
            text-align: center;
            transition: background-color 0.15s ease;
        }

        .nav-item.active {
            background-color: #d9d9d9;
        }

        .nav-item:hover:not(.active) {
            background-color: #f5f5f5;
        }

        .icon {
            width: 24px;
            height: 24px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-item .label {
            font-size: 11px;
            font-weight: bold;
            line-height: 1.2;
            display: block;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- MAIN DASHBOARD CONTENT --- */
        .main-content {
            flex: 1;
            background-color: #fdf8f5; /* Off-white background tint matching mockups */
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            overflow-y: auto;
            height: 100%;
        }

        .main-content h1 {
            font-size: 42px;
            font-family: Georgia, serif;
            font-weight: bold;
            color: #1a253c;
            margin-bottom: 4px;
        }

        .main-content .subtitle {
            font-size: 14px;
            color: #d88267;
            margin-bottom: 35px;
        }

        /* --- EXACT MOCKUP TABLE DESIGN --- */
        .table-container {
            width: 100%;
            max-width: 960px;
            background-color: #ffffff;
            border-radius: 18px; /* Elegant curved card container edges */
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04), 
                        0 4px 12px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        .table-card-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        .lecturer-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 15px;
        }

        /* Sage Green Theme Header Row */
        .lecturer-table th {
            background-color: #cbe3cc; 
            color: #1a253c;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            padding: 16px 30px;
            border-bottom: none;
        }

        .lecturer-table td {
            padding: 20px 30px;
            color: #333333;
            border-bottom: 1px solid #f3f3f3;
            vertical-align: middle;
        }

        .lecturer-table tbody tr:last-child td {
            border-bottom: none;
        }

        .col-id { width: 15%; }
        .col-name { width: 45%; }
        .col-status { width: 15%; }
        .col-actions { width: 25%; }

        /* --- DYNAMIC PILL STATUS BADGES --- */
        .status-badge {
            display: inline-block;
            padding: 5px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 20px;
            text-align: center;
        }

        /* Mockup Active Badge Green Colors */
        .active-status {
            background-color: #e2f0e3;
            color: #4a7c59;
        }

        /* Mockup Inactive Badge Terracotta Colors */
        .inactive-status {
            background-color: #fcf0e3;
            color: #b07d4c;
        }

        /* --- MOCKUP ACTION CONTROLS BUTTONS --- */
        .action-group {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 20px;
        }

        .btn-action {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s ease;
            outline: none;
        }

        .btn-action:hover {
            opacity: 0.8;
        }

        /* Minimal Edit text styling */
        .btn-edit {
            background: none;
            color: #1a253c;
            padding: 6px 12px;
        }

        /* Saved inline editing state placeholder styling */
        .btn-save {
            background-color: #e2f0e3;
            color: #4a7c59;
            padding: 6px 16px;
            border-radius: 20px;
        }

        /* Soft Terracotta Pill Background style */
        .btn-suspend {
            background-color: #eed6c5;
            color: #6e3716;
            padding: 6px 20px;
            border-radius: 20px;
        }

        /* Inline Editing State Overrides */
        .edit-input {
            width: 90%;
            padding: 6px 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        .edit-select {
            padding: 5px 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            background-color: #fff;
        }

        .empty-message {
            padding: 40px;
            text-align: center;
            color: #6c757d;
            font-style: italic;
        }

        /* --- RESPONSIVE WORKSPACE HANDLING --- */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .window-frame { flex-direction: column; height: auto; min-height: 100vh; }
            
            .sidebar {
                width: 100%; max-width: 100%; height: auto; flex-direction: row;
                justify-content: space-around; padding-top: 0; border-right: none;
                border-bottom: 1px solid #dcdcdc; position: sticky; top: 0; z-index: 100;
            }
            .sidebar nav { flex-direction: row; width: 100%; justify-content: space-around; }
            .nav-item { width: auto; height: 70px; padding: 5px 10px; flex: 1; }
            
            .main-content { padding: 30px 20px; }
            .main-content h1 { font-size: 32px; text-align: center; width: 100%; }
            .main-content .subtitle { text-align: center; width: 100%; margin-bottom: 25px; }
            
            .lecturer-table th, .lecturer-table td { padding: 12px 15px; font-size: 14px; }
            .action-group { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="window-frame">

        <aside class="sidebar">
            <nav>
                <div class="nav-item" data-page="logout" onclick="handleLogout(event)">
                    <div class="icon">
                        <img src="Aset/logOutBtn.svg" alt="Logout">
                    </div>
                    <span class="label">Log Out</span>
                </div>
           
                <div class="nav-item" data-page="home" onclick="window.location.href='mainPage.html'">
                    <div class="icon">
                        <img src="Aset/homeBtn.svg" alt="Home">
                    </div>
                    <span class="label">Home</span>
                </div>

                <div class="nav-item active" data-page="dashboard" onclick="window.location.href='dashboard.html'">
                    <div class="icon">
                        <img src="Aset/summaryBtn.svg" alt="Summary">
                    </div>
                    <span class="label">Dashboard</span>
                </div>
        
                <div class="nav-item" data-page="announcement" onclick="window.location.href='announcement.html'">
                    <div class="icon">
                        <img src="Aset/annoucment.svg" alt="Announcement">
                    </div>
                    <span class="label">Announcement</span>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Manage Lecturers</h1>
            <div class="subtitle">Review academic instructor rosters, authorization levels, and profile statuses:</div>

            <div class="table-container" id="tableContainer">
                <div class="table-card-wrapper">
                    <table class="lecturer-table" id="lecturerTable">
                        <thead>
                            <tr>
                                <th class="col-id">Lecturer ID</th>
                                <th class="col-name">Name</th>
                                <th class="col-status">Status</th>
                                <th class="col-actions" style="text-align: right; padding-right: 45px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="lecturer-id">L01239</td>
                                <td class="lecturer-name">Ts. Arif Shah bin Mahmud</td>
                                <td class="lecturer-status"><span class="status-badge inactive-status">Inactive</span></td>
                                <td>
                                    <div class="action-group" style="padding-right: 15px;">
                                        <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                        <button class="btn-action btn-suspend" onclick="suspendLecturer(this)">Suspend</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="lecturer-id">L01244</td>
                                <td class="lecturer-name">Dr. Muhammad Hisham bin Yahya</td>
                                <td class="lecturer-status"><span class="status-badge active-status">Active</span></td>
                                <td>
                                    <div class="action-group" style="padding-right: 15px;">
                                        <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                        <button class="btn-action btn-suspend" onclick="suspendLecturer(this)">Suspend</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="lecturer-id">L01257</td>
                                <td class="lecturer-name">Amar bin Rasyid</td>
                                <td class="lecturer-status"><span class="status-badge active-status">Active</span></td>
                                <td>
                                    <div class="action-group" style="padding-right: 15px;">
                                        <button class="btn-action btn-edit" onclick="toggleEdit(this)">Edit</button>
                                        <button class="btn-action btn-suspend" onclick="suspendLecturer(this)">Suspend</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

    </div>

    <script>
        function handleLogout(event) {
            event.preventDefault(); 
            if (confirm("Are you sure you want to logout?")) {
                window.location.href = "logIn.html";
            }
        }
        
        function toggleEdit(button) {
            const row = button.closest('tr');
            const idCell = row.querySelector('.lecturer-id');
            const nameCell = row.querySelector('.lecturer-name');
            const statusCell = row.querySelector('.lecturer-status');

            if (button.classList.contains('btn-edit')) {
                button.textContent = 'Save';
                button.classList.remove('btn-edit');
                button.classList.add('btn-save');

                const currentId = idCell.textContent.trim();
                const currentName = nameCell.textContent.trim();
                const currentStatus = statusCell.textContent.trim();

                idCell.innerHTML = `<input type="text" class="edit-input" value="${currentId}">`;
                nameCell.innerHTML = `<input type="text" class="edit-input" value="${currentName}">`;
                
                statusCell.innerHTML = `
                    <select class="edit-select">
                        <option value="Active" ${currentStatus === 'Active' ? 'selected' : ''}>Active</option>
                        <option value="Inactive" ${currentStatus === 'Inactive' ? 'selected' : ''}>Inactive</option>
                    </select>
                `;
            } else {
                button.textContent = 'Edit';
                button.classList.remove('btn-save');
                button.classList.add('btn-edit');

                const newId = idCell.querySelector('input').value.trim();
                const newName = nameCell.querySelector('input').value.trim();
                const newStatus = statusCell.querySelector('select').value;

                idCell.textContent = newId;
                nameCell.textContent = newName;
                
                const badgeClass = newStatus.toLowerCase() === 'active' ? 'active-status' : 'inactive-status';
                statusCell.innerHTML = `<span class="status-badge ${badgeClass}">${newStatus}</span>`;
            }
        }

        function suspendLecturer(button) {
            if (confirm("Are you sure you want to suspend this lecturer?")) {
                const row = button.closest('tr');
                const table = document.getElementById('lecturerTable');
                
                row.remove();

                const remainingRows = table.querySelectorAll('tbody tr');
                if (remainingRows.length === 0) {
                    const container = document.getElementById('tableContainer');
                    container.innerHTML = '<div class="empty-message">No active lecturer credentials found on the system server.</div>';
                }
            }
        }
    </script>
</body>
</html>
