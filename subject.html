<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreKnowledge - Manage Subjects</title>
    <link rel="stylesheet" href="subjectStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        
        <aside class="sidebar">
            <a href="login.html" class="nav-item highlight-blue">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Log Out</span>
            </a>
            <a href="mainPage.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="subject.html" class="nav-item active">
                <i class="fa-solid fa-file-invoice"></i>
                <span>Manage Subject</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-file-signature"></i>
                <span>Report</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-qrcode"></i>
                <span>Edit Quiz</span>
            </a>
            <a href="#" class="nav-item add-new">
                <i class="fa-solid fa-plus"></i>
                <span>Add new subject</span>
            </a>
        </aside> 

        <main class="main-content">
            <h1 class="page-title">Manage Subject</h1>

            <div class="subject-card">
                <div class="card-header">
                    <h2>Database</h2>
                </div>
                <div class="card-body">
                    <ul class="topic-list">
                        <li>SQL (Structured Query Language)</li>
                        <li>Database Design</li>
                    </ul>
                    
                    <div class="card-actions">
                        <button class="action-btn edit-btn">
                            <i class="fa-regular fa-pen-to-square"></i>
                            <span>Edit</span>
                        </button>
                        <button class="action-btn remove-btn">
                            <i class="fa-solid fa-circle-xmark"></i>
                            <span>Remove</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>

    </div>
</body>
</html>
